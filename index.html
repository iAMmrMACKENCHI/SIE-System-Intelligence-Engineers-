<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIE — Systems Intelligence Engineers</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* =============================================
   DESIGN TOKENS — SIE Enterprise System
   ============================================= */
:root {
  --bg-void:       #030608;
  --bg-deep:       #060B14;
  --bg-surface:    #0A1220;
  --bg-elevated:   #0F1928;
  --card-glass:    rgba(12,22,42,0.72);
  --border-dim:    rgba(255,255,255,0.06);
  --border-subtle: rgba(255,255,255,0.10);
  --border-active: rgba(0,120,255,0.45);

  --blue-core:    #0A7CFF;
  --blue-bright:  #2E9BFF;
  --blue-glow:    rgba(10,124,255,0.18);
  --blue-glow-lg: rgba(10,124,255,0.09);
  --cyan-accent:  #00C8FF;
  --teal-accent:  #00E5CC;

  --text-primary:   #D8E4F0;
  --text-secondary: #6F87A8;
  --text-muted:     #3D5270;
  --text-white:     #F0F6FF;

  --font-display: 'Syne', sans-serif;
  --font-body:    'Outfit', sans-serif;
  --font-mono:    'IBM Plex Mono', monospace;

  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  16px;
  --radius-xl:  24px;

  --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg-void);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
ul { list-style: none; }
img { display: block; max-width: 100%; }

/* =============================================
   GRID NOISE OVERLAY
   ============================================= */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(10,124,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,124,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

/* =============================================
   UTILITY
   ============================================= */
.container {
  width: 100%;
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 32px;
}
.section { padding: 120px 0; position: relative; z-index: 1; }
.tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--blue-bright);
  background: rgba(10,124,255,0.10);
  border: 1px solid rgba(10,124,255,0.22);
  padding: 6px 14px;
  border-radius: 40px;
  margin-bottom: 28px;
}
.tag::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--blue-core);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.4; transform:scale(0.7); }
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 3.5vw, 3rem);
  font-weight: 700;
  color: var(--text-white);
  line-height: 1.15;
  margin-bottom: 20px;
}
.section-sub {
  font-size: 1.05rem;
  color: var(--text-secondary);
  max-width: 560px;
  line-height: 1.7;
}
.accent { color: var(--blue-bright); }
.glass-card {
  background: var(--card-glass);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
}
.glass-card:hover {
  border-color: var(--border-active);
  transform: translateY(-4px);
  box-shadow: 0 24px 60px rgba(10,124,255,0.08), 0 0 0 1px rgba(10,124,255,0.12);
}

/* =============================================
   NAVBAR
   ============================================= */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(3,6,8,0.72);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-dim);
  padding: 0 40px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 14px;
}
.nav-logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--blue-core), var(--cyan-accent));
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 0.85rem;
  color: #fff;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}
.nav-logo-text {
  display: flex; flex-direction: column;
  gap: 1px;
}
.nav-logo-name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text-white);
  letter-spacing: 0.04em;
}
.nav-logo-sub {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 36px;
}
.nav-links a {
  font-size: 0.88rem;
  color: var(--text-secondary);
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--text-white); }
.nav-cta {
  display: flex; align-items: center; gap: 12px;
}
.btn-ghost {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  padding: 9px 20px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  font-family: var(--font-body);
}
.btn-ghost:hover {
  color: var(--text-white);
  border-color: var(--border-active);
  background: rgba(10,124,255,0.06);
}
.btn-primary {
  font-size: 0.85rem;
  font-weight: 600;
  color: #fff;
  padding: 10px 22px;
  background: var(--blue-core);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-body);
  letter-spacing: 0.01em;
}
.btn-primary:hover {
  background: var(--blue-bright);
  box-shadow: 0 0 28px rgba(10,124,255,0.45);
  transform: translateY(-1px);
}
.btn-large {
  padding: 15px 34px;
  font-size: 0.95rem;
  border-radius: var(--radius-md);
}

/* =============================================
   HERO SECTION
   ============================================= */
.hero {
  padding-top: 140px;
  padding-bottom: 100px;
  position: relative;
  overflow: hidden;
  min-height: 100vh;
  display: flex;
  align-items: center;
}
.hero-bg-glow {
  position: absolute;
  top: -200px; left: 50%; transform: translateX(-50%);
  width: 900px; height: 600px;
  background: radial-gradient(ellipse, rgba(10,124,255,0.10) 0%, transparent 70%);
  pointer-events: none;
}
.hero-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}
.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--blue-bright);
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.hero-eyebrow::before {
  content: '';
  display: inline-block;
  width: 28px; height: 1px;
  background: var(--blue-core);
}
.hero-headline {
  font-family: var(--font-display);
  font-size: clamp(2.6rem, 4.5vw, 4rem);
  font-weight: 800;
  line-height: 1.08;
  color: var(--text-white);
  margin-bottom: 24px;
  letter-spacing: -0.02em;
}
.hero-sub {
  font-size: 1.05rem;
  color: var(--text-secondary);
  line-height: 1.75;
  margin-bottom: 42px;
  max-width: 480px;
}
.hero-actions {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}
.hero-metrics {
  display: flex;
  gap: 36px;
  margin-top: 56px;
  padding-top: 36px;
  border-top: 1px solid var(--border-dim);
}
.hero-metric-val {
  font-family: var(--font-display);
  font-size: 1.9rem;
  font-weight: 700;
  color: var(--text-white);
  line-height: 1;
  margin-bottom: 4px;
}
.hero-metric-val span { color: var(--blue-bright); }
.hero-metric-label {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Canvas Viz */
.hero-viz {
  position: relative;
}
#networkCanvas {
  width: 100%;
  border-radius: var(--radius-xl);
  border: 1px solid var(--border-subtle);
  display: block;
}
.viz-overlay {
  position: absolute;
  inset: 0;
  border-radius: var(--radius-xl);
  background: linear-gradient(180deg, transparent 60%, var(--bg-void) 100%);
  pointer-events: none;
}
.viz-badge {
  position: absolute;
  background: var(--card-glass);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 10px 16px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  gap: 10px;
  animation: floatY 3s ease-in-out infinite;
}
.viz-badge-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--teal-accent);
  box-shadow: 0 0 10px var(--teal-accent);
  animation: pulse 1.5s ease-in-out infinite;
}
.viz-badge-text {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-primary);
  letter-spacing: 0.04em;
}
.viz-badge-1 { top: 20px; left: 20px; animation-delay: 0s; }
.viz-badge-2 { bottom: 30px; right: 20px; animation-delay: 1s; }
.viz-badge-3 { top: 50%; left: -10px; transform: translateY(-50%); animation-delay: 2s; }
@keyframes floatY {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
.viz-badge-3 {
  animation-name: floatY3;
}
@keyframes floatY3 {
  0%,100% { transform: translateY(-50%); }
  50%      { transform: translateY(calc(-50% - 8px)); }
}

/* =============================================
   TRUST BANNER
   ============================================= */
.trust-bar {
  padding: 32px 0;
  background: var(--bg-surface);
  border-top: 1px solid var(--border-dim);
  border-bottom: 1px solid var(--border-dim);
  position: relative;
  z-index: 1;
}
.trust-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.trust-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.82rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.trust-icon {
  width: 32px; height: 32px;
  background: rgba(10,124,255,0.10);
  border: 1px solid rgba(10,124,255,0.18);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}
.trust-divider {
  width: 1px; height: 28px;
  background: var(--border-dim);
}
.trust-note {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-align: right;
  max-width: 300px;
}

/* =============================================
   PROBLEM SECTION
   ============================================= */
.problem-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 60px;
}
.problem-card {
  padding: 28px 24px;
  border-radius: var(--radius-md);
  background: var(--bg-surface);
  border: 1px solid var(--border-dim);
  position: relative;
  overflow: hidden;
  transition: all 0.3s var(--ease-smooth);
  cursor: default;
}
.problem-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--blue-core), var(--cyan-accent));
  opacity: 0;
  transition: opacity 0.3s;
}
.problem-card:hover::before { opacity: 1; }
.problem-card:hover {
  border-color: rgba(10,124,255,0.25);
  background: var(--bg-elevated);
}
.problem-icon {
  font-size: 1.5rem;
  margin-bottom: 14px;
  display: block;
}
.problem-title {
  font-family: var(--font-display);
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--text-white);
  margin-bottom: 8px;
}
.problem-desc {
  font-size: 0.8rem;
  color: var(--text-muted);
  line-height: 1.6;
}
.problem-intro {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  margin-bottom: 16px;
}

/* =============================================
   HOW SIE WORKS — TIMELINE
   ============================================= */
.process-section { background: var(--bg-deep); }
.process-wrapper { margin-top: 64px; }
.process-track {
  position: relative;
  padding-left: 60px;
}
.process-track::before {
  content: '';
  position: absolute;
  left: 18px;
  top: 28px; bottom: 28px;
  width: 2px;
  background: linear-gradient(180deg, var(--blue-core) 0%, var(--cyan-accent) 50%, var(--teal-accent) 100%);
  opacity: 0.4;
}
.process-step {
  display: flex;
  gap: 32px;
  margin-bottom: 40px;
  position: relative;
  align-items: flex-start;
}
.process-step:last-child { margin-bottom: 0; }
.step-marker {
  position: absolute;
  left: -50px;
  top: 14px;
  width: 38px; height: 38px;
  background: var(--bg-void);
  border: 2px solid var(--blue-core);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  z-index: 2;
  transition: all 0.3s;
}
.step-number {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--blue-bright);
}
.process-step:hover .step-marker {
  background: var(--blue-core);
  box-shadow: 0 0 20px rgba(10,124,255,0.5);
}
.process-step:hover .step-number { color: #fff; }
.step-card {
  flex: 1;
  padding: 28px 32px;
  border-radius: var(--radius-md);
  background: var(--card-glass);
  border: 1px solid var(--border-subtle);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: all 0.3s var(--ease-smooth);
}
.process-step:hover .step-card {
  border-color: rgba(10,124,255,0.3);
  background: rgba(10,124,255,0.05);
}
.step-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}
.step-label {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--blue-bright);
}
.step-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text-white);
  margin-bottom: 10px;
}
.step-desc {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.65;
  margin-bottom: 16px;
}
.step-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.step-tag {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-muted);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-dim);
  padding: 4px 10px;
  border-radius: 4px;
  letter-spacing: 0.04em;
}

/* =============================================
   INDUSTRIES
   ============================================= */
.industries-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 60px;
}
.industry-card {
  padding: 32px 24px;
  position: relative;
  overflow: hidden;
  cursor: default;
}
.industry-icon-wrap {
  width: 52px; height: 52px;
  background: rgba(10,124,255,0.10);
  border: 1px solid rgba(10,124,255,0.2);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  margin-bottom: 18px;
  transition: all 0.3s;
}
.industry-card:hover .industry-icon-wrap {
  background: rgba(10,124,255,0.18);
  border-color: rgba(10,124,255,0.45);
  box-shadow: 0 0 20px rgba(10,124,255,0.15);
}
.industry-name {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-white);
  margin-bottom: 8px;
}
.industry-desc {
  font-size: 0.8rem;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 16px;
}
.industry-mini-stats {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.mini-stat {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-muted);
}
.mini-stat-bar {
  flex: 1;
  height: 2px;
  background: var(--border-dim);
  border-radius: 2px;
  overflow: hidden;
}
.mini-stat-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue-core), var(--cyan-accent));
  border-radius: 2px;
  transition: width 1s ease;
}
.industry-card:nth-child(5),
.industry-card:nth-child(6),
.industry-card:nth-child(7) {
  /* last row 3-col */
}

/* =============================================
   WHY SIE
   ============================================= */
.why-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: start;
  margin-top: 60px;
}
.why-list { display: flex; flex-direction: column; gap: 20px; }
.why-item {
  display: flex;
  gap: 18px;
  padding: 24px;
  border-radius: var(--radius-md);
  background: var(--bg-surface);
  border: 1px solid var(--border-dim);
  transition: all 0.3s;
}
.why-item:hover {
  border-color: rgba(10,124,255,0.25);
  background: var(--bg-elevated);
}
.why-icon {
  width: 40px; height: 40px;
  border-radius: 8px;
  background: rgba(10,124,255,0.10);
  border: 1px solid rgba(10,124,255,0.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.why-item-title {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-white);
  margin-bottom: 5px;
}
.why-item-desc {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.65;
}
.why-panel {
  position: sticky;
  top: 100px;
}
.why-panel-card {
  padding: 40px;
  border-radius: var(--radius-xl);
  background: linear-gradient(135deg, rgba(10,124,255,0.10) 0%, rgba(0,200,255,0.05) 100%);
  border: 1px solid rgba(10,124,255,0.2);
  position: relative;
  overflow: hidden;
}
.why-panel-card::after {
  content: '';
  position: absolute;
  top: -50%; right: -50%;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(10,124,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.why-panel-eq {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border-dim);
}
.eq-line {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  font-size: 0.85rem;
}
.eq-term { color: var(--text-secondary); }
.eq-op { color: var(--blue-bright); font-weight: 600; }
.eq-result {
  color: var(--teal-accent);
  font-size: 0.95rem;
  font-weight: 600;
}
.why-panel-title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-white);
  margin-bottom: 12px;
}
.why-panel-desc {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 28px;
}

/* =============================================
   CASE STUDIES
   ============================================= */
.cases-grid {
  display: grid;
